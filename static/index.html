<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Calculator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .calculator-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            width: 320px;
        }

        .display {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: right;
            font-size: 2.5em;
            font-weight: 300;
            word-wrap: break-word;
            word-break: break-all;
            min-height: 100px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
        }

        .expression {
            font-size: 0.8em;
            opacity: 0.7;
            margin-bottom: 10px;
            min-height: 20px;
        }

        .result {
            font-size: 1em;
            min-height: 50px;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 0;
            padding: 20px;
        }

        button {
            padding: 20px;
            font-size: 1.2em;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            background: #f0f0f0;
            color: #333;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        button:hover {
            background: #e0e0e0;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        button:active {
            transform: translateY(0);
        }

        .operator {
            background: #667eea;
            color: white;
        }

        .operator:hover {
            background: #5568d3;
        }

        .clear {
            background: #ff6b6b;
            color: white;
        }

        .clear:hover {
            background: #ee5a52;
        }

        .equals {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .equals:hover {
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .error {
            color: #ff6b6b;
        }

        .loading {
            opacity: 0.6;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="calculator-container">
        <div class="display">
            <div class="expression" id="expression"></div>
            <div class="result" id="display">0</div>
        </div>
        <div class="buttons">
            <button class="clear" onclick="clearDisplay()">C</button>
            <button class="operator" onclick="appendOperator('/')">÷</button>
            <button class="operator" onclick="appendOperator('*')">×</button>
            <button class="operator" onclick="deleteLastChar()">←</button>
            
            <button onclick="appendNumber('7')">7</button>
            <button onclick="appendNumber('8')">8</button>
            <button onclick="appendNumber('9')">9</button>
            <button class="operator" onclick="appendOperator('-')">-</button>
            
            <button onclick="appendNumber('4')">4</button>
            <button onclick="appendNumber('5')">5</button>
            <button onclick="appendNumber('6')">6</button>
            <button class="operator" onclick="appendOperator('+')">+</button>
            
            <button onclick="appendNumber('1')">1</button>
            <button onclick="appendNumber('2')">2</button>
            <button onclick="appendNumber('3')">3</button>
            <button onclick="appendNumber('.')">.</button>
            
            <button onclick="appendNumber('0')" style="grid-column: span 2;">0</button>
            <button class="equals" onclick="calculate()">=</button>
        </div>
    </div>

    <script>
        let display = document.getElementById('display');
        let expression = document.getElementById('expression');
        let currentExpression = '';

        function appendNumber(num) {
            currentExpression += num;
            updateDisplay();
        }

        function appendOperator(op) {
            if (currentExpression && !currentExpression.endsWith(' ')) {
                currentExpression += ' ' + op + ' ';
                updateDisplay();
            }
        }

        function deleteLastChar() {
            currentExpression = currentExpression.slice(0, -1);
            updateDisplay();
        }

        function clearDisplay() {
            currentExpression = '';
            updateDisplay();
            display.textContent = '0';
            display.classList.remove('error');
        }

        function updateDisplay() {
            display.textContent = currentExpression || '0';
            expression.textContent = '';
        }

        async function calculate() {
            if (!currentExpression.trim()) return;

            try {
                display.classList.add('loading');
                expression.textContent = currentExpression;

                const response = await fetch('/api/calc', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ expression: currentExpression })
                });

                const data = await response.json();
                display.classList.remove('loading');

                if (data.error) {
                    display.textContent = 'Error: ' + data.error;
                    display.classList.add('error');
                } else {
                    display.textContent = data.result;
                    display.classList.remove('error');
                    currentExpression = String(data.result);
                }
            } catch (error) {
                display.classList.remove('loading');
                display.textContent = 'Error: ' + error.message;
                display.classList.add('error');
            }
        }

        // Allow keyboard input
        document.addEventListener('keydown', function(event) {
            if (event.key >= '0' && event.key <= '9') appendNumber(event.key);
            if (event.key === '+' || event.key === '-' || event.key === '*' || event.key === '/') {
                event.preventDefault();
                appendOperator(event.key);
            }
            if (event.key === '.') appendNumber('.');
            if (event.key === 'Enter') {
                event.preventDefault();
                calculate();
            }
            if (event.key === 'Backspace') {
                event.preventDefault();
                deleteLastChar();
            }
            if (event.key === 'Escape') clearDisplay();
        });
    </script>
</body>
</html>
